name: Docker

# Validate that the API and dashboard container images build. Runs on pushes to
# main and on changes that touch the apps or their Dockerfiles.
on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  images:
    name: Build ${{ matrix.image }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: apps/api/Dockerfile
          - image: web
            dockerfile: apps/web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: beacon-${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
